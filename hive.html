<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIVE - FIN-STRAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .hive-card { transition: all 0.2s; }
        .hive-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- ヘッダー -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-gradient font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400">HIVE</h1>
                <p class="text-[10px] text-slate-500 font-mono">Hub for Information, Views, Exchange</p>
            </div>
            <div class="flex items-center gap-4">
                <p id="headerBranch" class="text-xs text-slate-400 font-bold">読込中...</p>
                <a href="portal.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded border border-slate-700 transition flex items-center"><i class="fa-solid fa-arrow-left mr-1"></i>ポータルへ戻る</a>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow p-4 max-w-6xl mx-auto w-full">
        <div class="flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
            <div>
                <h2 class="text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-book-open text-sky-400"></i>ナレッジ共有</h2>
                <p class="text-xs text-slate-400 mt-1">店舗で発生したトラブルや改善提案を蓄積・共有する場です</p>
            </div>
            <button onclick="openReportModal()" class="bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-500 hover:to-indigo-500 text-white text-sm font-bold px-4 py-2 rounded-lg shadow-lg transition flex items-center">
                <i class="fa-solid fa-plus mr-1"></i>新規報告
            </button>
        </div>

        <!-- 一覧表示エリア -->
        <div id="hiveList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <p class="text-slate-500 text-sm col-span-full text-center py-10"><i class="fa-solid fa-spinner fa-spin mr-1"></i>データを読み込み中...</p>
        </div>
    </main>

    <!-- 新規報告モーダル -->
    <div id="reportModal" class="hidden fixed inset-0 bg-black/80 z-50 justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-lg max-h-[90vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center p-4 border-b border-slate-800">
                <h3 class="text-lg font-black text-white flex items-center"><i class="fa-solid fa-pen-to-square text-sky-400 mr-2"></i>新規知見・レポート作成</h3>
                <button onclick="closeReportModal()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 overflow-y-auto space-y-4">
                <div class="bg-amber-950/30 border border-amber-900/50 p-3 rounded-xl mb-2">
                    <p class="text-[10px] text-amber-500 font-bold flex items-start"><i class="fa-solid fa-triangle-exclamation mr-1 mt-0.5"></i>注意: お客様の個人情報（氏名・連絡先など）は絶対に記載しないでください。</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block font-bold">タイトル</label>
                    <input type="text" id="reportTitle" class="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:border-sky-500 outline-none font-bold" placeholder="例: 海外製カードの真贋判定で見落としやすいポイント">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-slate-400 mb-1 block font-bold">カテゴリー</label>
                        <select id="reportCategory" class="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:border-sky-500 outline-none font-bold">
                            <option value="トラブル">トラブル</option>
                            <option value="クレーム">クレーム</option>
                            <option value="改善提案">改善提案</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 mb-1 block font-bold">発生日</label>
                        <input type="date" id="reportDate" class="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:border-sky-500 outline-none font-mono [color-scheme:dark]">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block font-bold">発生した事象の詳細</label>
                    <textarea id="reportContent" rows="3" class="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:border-sky-500 outline-none resize-none" placeholder="どのようなケースで、何が起きたかを記載してください"></textarea>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block font-bold">対応策・今後の改善案</label>
                    <textarea id="reportAction" rows="3" class="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 focus:border-sky-500 outline-none resize-none" placeholder="現場での対処方法や、他店でも活かせる改善アイデアを記載してください"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-slate-800 bg-slate-950/50 rounded-b-2xl">
                <button id="btnSubmitReport" onclick="submitReport()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-3 rounded-xl transition shadow-lg">
                    本部へ送信・申請する
                </button>
            </div>
        </div>
    </div>

    <script>
        // ポータルの認証設定と完全同期
        const supabaseUrl = 'https://deuxqfyxoojgdfwufslr.supabase.co';
        const supabaseKey = 'sb_publishable_ezlhFGa3n5uxnA8jJC-t_g_F3Wzl0Lt';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;

        window.onload = () => {
            const savedUser = sessionStorage.getItem('finUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('headerBranch').innerText = `${currentUser.name} (${currentUser.branch})`;
                loadReports();
            } else {
                alert("セッション情報がありません。ポータルからログインしてください。");
                window.location.href = 'portal.html';
            }
        };

        // ナレッジの読み込み
        async function loadReports() {
            try {
                // 本部承認されたもの、または自分の店舗が申請中のものをまとめて最新順に取得
                const { data, error } = await db.from('hive_reports').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                renderReports(data);
            } catch (err) {
                console.error(err);
                document.getElementById('hiveList').innerHTML = `<p class="text-rose-500 text-sm col-span-full text-center py-10">データの読み込みに失敗しました。</p>`;
            }
        }

        // カード描画処理（点数は一般スタッフ側には一切表示されない設計）
        function renderReports(reports) {
            const listEl = document.getElementById('hiveList');
            listEl.innerHTML = "";
            
            if (!reports || reports.length === 0) {
                listEl.innerHTML = `<p class="text-slate-500 text-sm col-span-full text-center py-10">共有されたナレッジがまだありません。</p>`;
                return;
            }

            reports.forEach(r => {
                // 店舗視点でのステータス制御（本部画面以外は点数は非表示）
                let statusBadge = "";
                if (r.status === 'pending') {
                    statusBadge = `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/30 text-[10px] px-2 py-0.5 rounded-full font-bold">本部確認中</span>`;
                } else if (r.status === 'returned') {
                    statusBadge = `<span class="bg-rose-500/10 text-rose-400 border border-rose-500/30 text-[10px] px-2 py-0.5 rounded-full font-bold"><i class="fa-solid fa-rotate-left mr-1"></i>差戻し</span>`;
                } else if (r.status === 'approved') {
                    statusBadge = `<span class="bg-sky-500/10 text-sky-400 border border-sky-500/30 text-[10px] px-2 py-0.5 rounded-full font-bold flex items-center gap-1"><i class="fa-solid fa-crown text-amber-400"></i>全体共有済</span>`;
                }

                // カテゴリカラー
                let catColor = "text-slate-400 bg-slate-950";
                if (r.category === "クレーム") catColor = "text-rose-400 bg-rose-950/30 border-rose-900/50";
                else if (r.category === "トラブル") catColor = "text-amber-400 bg-amber-950/30 border-amber-900/50";
                else if (r.category === "改善提案") catColor = "text-emerald-400 bg-emerald-950/30 border-emerald-900/50";

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-5 rounded-2xl hive-card flex flex-col relative";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        ${statusBadge}
                        <span class="text-[10px] px-2 py-0.5 rounded border ${catColor} font-bold">${r.category}</span>
                    </div>
                    <h3 class="text-sm font-black text-slate-100 mb-2 leading-snug">${r.title}</h3>
                    
                    <div class="text-xs text-slate-400 space-y-2 mt-2 flex-grow bg-slate-950/40 p-3 rounded-xl border border-slate-800/60">
                        <div>
                            <span class="text-[10px] font-bold text-sky-400 block mb-0.5">【事象】</span>
                            <p class="whitespace-pre-wrap leading-relaxed">${r.content}</p>
                        </div>
                        <div class="border-t border-slate-800/50 pt-2 mt-2">
                            <span class="text-[10px] font-bold text-emerald-400 block mb-0.5">【対応・解決策】</span>
                            <p class="whitespace-pre-wrap leading-relaxed">${r.action_taken}</p>
                        </div>
                    </div>
                    
                    <div class="text-[10px] text-slate-500 font-mono mt-4 pt-2 border-t border-slate-800/50 flex justify-between items-center">
                        <span class="font-bold"><i class="fa-solid fa-store mr-1"></i>${r.branch} (${r.created_by})</span>
                        <span><i class="fa-solid fa-calendar mr-1"></i>${r.incident_date}</span>
                    </div>

                    ${r.hq_comment ? `
                    <div class="bg-indigo-950/20 p-3 rounded-xl border border-indigo-900/30 mt-3">
                        <p class="text-[10px] text-indigo-400 font-bold flex items-center mb-1"><i class="fa-solid fa-comment-dots mr-1"></i>本部からの指示・フィードバック</p>
                        <p class="text-xs text-slate-300 break-words">${r.hq_comment}</p>
                    </div>` : ''}
                `;
                listEl.appendChild(card);
            });
        }

        function openReportModal() { 
            document.getElementById('reportDate').value = new Date().toLocaleDateString('en-CA');
            document.getElementById('reportModal').classList.replace('hidden', 'flex'); 
        }
        function closeReportModal() { document.getElementById('reportModal').classList.replace('flex', 'hidden'); }

        // 新規申請処理
        async function submitReport() {
            const btn = document.getElementById('btnSubmitReport');
            const title = document.getElementById('reportTitle').value.trim();
            const category = document.getElementById('reportCategory').value;
            const incidentDate = document.getElementById('reportDate').value;
            const content = document.getElementById('reportContent').value.trim();
            const actionTaken = document.getElementById('reportAction').value.trim();

            if (!title || !incidentDate || !content || !actionTaken) {
                alert("すべての項目を入力してください。");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 送信中...';

            try {
                const newId = "HIVE" + new Date().getTime();
                const { error } = await db.from('hive_reports').insert([{
                    id: newId,
                    branch: currentUser.branch,
                    created_by: currentUser.name,
                    title: title,
                    category: category,
                    incident_date: incidentDate,
                    content: content,
                    action_taken: actionTaken,
                    status: 'pending',
                    score: 0
                }]);

                if (error) throw error;

                alert("ナレッジを申請しました！本部の確認をお待ちください。");
                closeReportModal();
                
                document.getElementById('reportTitle').value = "";
                document.getElementById('reportContent').value = "";
                document.getElementById('reportAction').value = "";
                
                loadReports(); 
            } catch (err) {
                console.error(err);
                alert("送信に失敗しました。");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '本部へ送信・申請する';
            }
        }
    </script>
</body>
</html>
