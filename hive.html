<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIVE - FIN-STRAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .hive-card { transition: all 0.2s; }
        .hive-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .tab-btn.active { border-bottom: 2px solid #38bdf8; color: #38bdf8; background-color: rgba(56, 189, 248, 0.1); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/80 z-50 flex flex-col justify-center items-center backdrop-blur-sm hidden">
        <i class="fa-solid fa-spinner fa-spin text-4xl text-sky-500 mb-4"></i>
        <p class="text-sky-400 text-sm font-bold animate-pulse" id="loadingText">処理中...</p>
    </div>

    <!-- ヘッダー -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400">HIVE</h1>
                <p class="text-[10px] text-slate-500 font-mono">Hub for Information, Views, Exchange</p>
            </div>
            <div class="flex items-center gap-4">
                <p id="headerBranch" class="text-xs text-slate-400 font-bold">読込中...</p>
                <a href="portal.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded border border-slate-700 transition flex items-center shadow"><i class="fa-solid fa-arrow-left mr-1"></i>ポータルへ戻る</a>
            </div>
        </div>
        <!-- タブメニュー -->
        <div class="max-w-6xl mx-auto mt-4 flex gap-2 border-b border-slate-800">
            <button onclick="switchTab('knowledge')" id="tab-knowledge" class="tab-btn active px-4 py-2 text-sm font-bold text-slate-400 hover:text-sky-300 transition-colors rounded-t-lg"><i class="fa-solid fa-book-open mr-1"></i>ナレッジ一覧</button>
            <button onclick="switchTab('approval')" id="tab-approval" class="tab-btn hidden px-4 py-2 text-sm font-bold text-amber-400 hover:text-amber-300 transition-colors rounded-t-lg relative"><i class="fa-solid fa-inbox mr-1"></i>承認トレイ <span id="pendingBadge" class="hidden absolute top-1 right-1 bg-rose-500 text-white text-[9px] px-1.5 rounded-full">0</span></button>
            <button onclick="switchTab('create')" id="tab-create" class="tab-btn px-4 py-2 text-sm font-bold text-slate-400 hover:text-sky-300 transition-colors rounded-t-lg"><i class="fa-solid fa-pen-to-square mr-1"></i>新規報告</button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow p-4 max-w-6xl mx-auto w-full">
        
        <!-- ==================== タブ1: ナレッジ一覧 ==================== -->
        <div id="content-knowledge" class="block space-y-4">
            <!-- 検索・フィルターバー -->
            <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-wrap gap-3 shadow-lg">
                <div class="flex-grow min-w-[200px] relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="キーワード検索..." class="w-full bg-slate-950 border border-slate-700 text-white text-sm rounded-lg py-2 pl-9 pr-3 focus:border-sky-500 outline-none">
                </div>
                <select id="filterCategory" onchange="applyFilters()" class="bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 outline-none font-bold">
                    <option value="">全カテゴリ</option>
                    <option value="トラブル">トラブル</option>
                    <option value="クレーム">クレーム</option>
                    <option value="改善提案">改善提案</option>
                </select>
                <select id="filterBranch" onchange="applyFilters()" class="bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 outline-none font-bold">
                    <option value="">全店舗</option>
                    <!-- JavaScriptで動的に追加 -->
                </select>
                <select id="sortOrder" onchange="applyFilters()" class="bg-slate-950 border border-slate-700 text-white text-sm rounded-lg px-3 py-2 outline-none font-bold">
                    <option value="date_desc">発生日 (新しい順)</option>
                    <option value="date_asc">発生日 (古い順)</option>
                </select>
            </div>
            
            <div id="knowledgeList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 承認済みナレッジカードがここに描画されます -->
            </div>
        </div>

        <!-- ==================== タブ2: 承認トレイ (本部のみ) ==================== -->
        <div id="content-approval" class="hidden space-y-4">
            <div class="bg-amber-950/20 border border-amber-900/50 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <h2 class="text-amber-400 font-bold text-sm flex items-center"><i class="fa-solid fa-clipboard-check mr-2"></i>本部承認待ち一覧</h2>
                    <p class="text-[10px] text-slate-400 mt-1">内容を精査し、店舗スコア(ポイント)を入力して承認・全体共有を行ってください。</p>
                </div>
            </div>
            <div id="approvalList" class="space-y-4">
                <!-- 承認待ちカードがここに描画されます -->
            </div>
        </div>

        <!-- ==================== タブ3: 新規報告 ==================== -->
        <div id="content-create" class="hidden">
            <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl shadow-2xl max-w-3xl mx-auto">
                <div class="border-b border-slate-800 pb-4 mb-6">
                    <h2 class="text-lg font-black text-white flex items-center"><i class="fa-solid fa-bullhorn text-sky-400 mr-2"></i>新しい知見を投稿する</h2>
                    <p class="text-xs text-slate-400 mt-1">店舗で起きた事象や対応策を入力し、本部へ送信してください。本部の承認後、全店舗へ共有されます。</p>
                </div>
                
                <div class="bg-amber-950/30 border border-amber-900/50 p-3 rounded-xl mb-6 shadow-inner">
                    <p class="text-xs text-amber-500 font-bold flex items-center"><i class="fa-solid fa-triangle-exclamation mr-2"></i>注意: お客様の個人情報（氏名・連絡先など）は絶対に記載しないでください。</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-sm text-slate-300 mb-2 block font-bold">タイトル <span class="text-rose-400 text-[10px] ml-1">必須</span></label>
                        <input type="text" id="reportTitle" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 focus:border-sky-500 outline-none font-bold transition-colors" placeholder="一目で内容がわかるタイトル">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-sm text-slate-300 mb-2 block font-bold">カテゴリー <span class="text-rose-400 text-[10px] ml-1">必須</span></label>
                            <select id="reportCategory" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 focus:border-sky-500 outline-none font-bold transition-colors">
                                <option value="トラブル">トラブル</option>
                                <option value="クレーム">クレーム</option>
                                <option value="改善提案">改善提案</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm text-slate-300 mb-2 block font-bold">発生日 <span class="text-rose-400 text-[10px] ml-1">必須</span></label>
                            <input type="date" id="reportDate" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 focus:border-sky-500 outline-none font-mono transition-colors [color-scheme:dark]">
                        </div>
                    </div>
                    <div>
                        <label class="text-sm text-slate-300 mb-2 block font-bold">発生した事象の詳細 <span class="text-rose-400 text-[10px] ml-1">必須</span></label>
                        <textarea id="reportContent" rows="5" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 focus:border-sky-500 outline-none resize-y transition-colors" placeholder="どのようなケースで、何が起きたかを具体的に記載してください"></textarea>
                    </div>
                    <div>
                        <label class="text-sm text-slate-300 mb-2 block font-bold">対応策・今後の改善案 <span class="text-rose-400 text-[10px] ml-1">必須</span></label>
                        <textarea id="reportAction" rows="5" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 focus:border-sky-500 outline-none resize-y transition-colors" placeholder="現場での対処方法や、他店でも活かせる改善アイデアを記載してください"></textarea>
                    </div>
                    
                    <div class="pt-4">
                        <button id="btnSubmitReport" onclick="submitReport()" class="w-full bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-500 hover:to-indigo-500 text-white font-black py-4 rounded-xl shadow-lg shadow-sky-900/50 transition-all transform hover:-translate-y-1">
                            <i class="fa-solid fa-paper-plane mr-2"></i>本部へ申請する
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Supabase接続設定
        const supabaseUrl = 'https://deuxqfyxoojgdfwufslr.supabase.co';
        const supabaseKey = 'sb_publishable_ezlhFGa3n5uxnA8jJC-t_g_F3Wzl0Lt';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let allReports = []; // 全件のキャッシュ

        window.onload = () => {
            const savedUser = sessionStorage.getItem('finUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('headerBranch').innerText = `${currentUser.name} (${currentUser.branch})`;
                
                // 本部権限（全店舗編集権限）がある場合、承認トレイタブを表示
                if (currentUser.permissions && currentUser.permissions.editAll) {
                    document.getElementById('tab-approval').classList.remove('hidden');
                }

                // 新規作成用の日付初期値
                document.getElementById('reportDate').value = new Date().toLocaleDateString('en-CA');
                
                fetchReports();
            } else {
                alert("セッション情報がありません。ポータルからログインしてください。");
                window.location.href = 'portal.html';
            }
        };

        // ローディングUI
        function showLoading(text) {
            document.getElementById('loadingText').innerText = text || "処理中...";
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // タブ切り替えロジック
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'bg-sky-500/10'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            document.getElementById('content-knowledge').classList.add('hidden');
            document.getElementById('content-approval').classList.add('hidden');
            document.getElementById('content-create').classList.add('hidden');
            
            document.getElementById('content-' + tabId).classList.remove('hidden');

            if(tabId === 'knowledge') applyFilters();
        }

        // データ取得
        async function fetchReports() {
            showLoading("データ取得中...");
            try {
                const { data, error } = await db.from('hive_reports').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                allReports = data || [];
                
                // 店舗フィルタの選択肢を動的生成
                const branches = [...new Set(allReports.map(r => r.branch))].filter(b => b);
                const filterBranch = document.getElementById('filterBranch');
                filterBranch.innerHTML = '<option value="">全店舗</option>';
                branches.forEach(b => {
                    filterBranch.innerHTML += `<option value="${b}">${b}</option>`;
                });

                applyFilters();
                renderApprovalList();
            } catch (err) {
                console.error(err);
                alert("データの取得に失敗しました。");
            } finally {
                hideLoading();
            }
        }

        // ==================== タブ1: ナレッジ一覧ロジック ====================
        function applyFilters() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('filterCategory').value;
            const branch = document.getElementById('filterBranch').value;
            const sort = document.getElementById('sortOrder').value;

            // 承認済みのもの（または自分が投稿した差し戻し等も表示したい場合はここで調整可能。今回は承認済みのみとする）
            let filtered = allReports.filter(r => r.status === 'approved');

            if (keyword) {
                filtered = filtered.filter(r => 
                    (r.title && r.title.toLowerCase().includes(keyword)) || 
                    (r.content && r.content.toLowerCase().includes(keyword)) ||
                    (r.action_taken && r.action_taken.toLowerCase().includes(keyword))
                );
            }
            if (category) {
                filtered = filtered.filter(r => r.category === category);
            }
            if (branch) {
                filtered = filtered.filter(r => r.branch === branch);
            }

            // ソート
            filtered.sort((a, b) => {
                if (sort === 'date_desc') return new Date(b.incident_date) - new Date(a.incident_date);
                if (sort === 'date_asc') return new Date(a.incident_date) - new Date(b.incident_date);
                return 0;
            });

            renderKnowledgeList(filtered);
        }

        function renderKnowledgeList(reports) {
            const listEl = document.getElementById('knowledgeList');
            listEl.innerHTML = "";
            
            if (reports.length === 0) {
                listEl.innerHTML = `<p class="text-slate-500 text-sm col-span-full text-center py-10">該当するナレッジが見つかりません。</p>`;
                return;
            }

            reports.forEach(r => {
                let catColor = "text-slate-400 bg-slate-950";
                if (r.category === "クレーム") catColor = "text-rose-400 bg-rose-950/30 border-rose-900/50";
                else if (r.category === "トラブル") catColor = "text-amber-400 bg-amber-950/30 border-amber-900/50";
                else if (r.category === "改善提案") catColor = "text-emerald-400 bg-emerald-950/30 border-emerald-900/50";

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-5 rounded-2xl hive-card flex flex-col relative";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] px-2 py-0.5 rounded border ${catColor} font-bold">${r.category}</span>
                        ${r.score > 0 && (currentUser.permissions && currentUser.permissions.editAll) ? `<span class="text-[10px] text-amber-400 bg-amber-950/50 px-2 py-0.5 rounded font-bold shadow-inner border border-amber-900"><i class="fa-solid fa-star mr-1"></i>${r.score}pt</span>` : ''}
                    </div>
                    <h3 class="text-sm font-black text-slate-100 mb-2 leading-snug">${r.title}</h3>
                    
                    <div class="text-xs text-slate-400 space-y-2 mt-2 flex-grow bg-slate-950/40 p-3 rounded-xl border border-slate-800/60">
                        <div>
                            <span class="text-[10px] font-bold text-sky-400 block mb-0.5">【事象】</span>
                            <p class="whitespace-pre-wrap leading-relaxed line-clamp-3">${r.content}</p>
                        </div>
                        <div class="border-t border-slate-800/50 pt-2 mt-2">
                            <span class="text-[10px] font-bold text-emerald-400 block mb-0.5">【対応・解決策】</span>
                            <p class="whitespace-pre-wrap leading-relaxed line-clamp-3">${r.action_taken}</p>
                        </div>
                    </div>
                    
                    <div class="text-[10px] text-slate-500 font-mono mt-4 pt-2 border-t border-slate-800/50 flex justify-between items-center">
                        <span class="font-bold"><i class="fa-solid fa-store mr-1"></i>${r.branch} (${r.created_by})</span>
                        <span><i class="fa-solid fa-calendar mr-1"></i>${r.incident_date}</span>
                    </div>

                    ${r.hq_comment ? `
                    <div class="bg-indigo-950/20 p-3 rounded-xl border border-indigo-900/30 mt-3">
                        <p class="text-[10px] text-indigo-400 font-bold flex items-center mb-1"><i class="fa-solid fa-comment-dots mr-1"></i>本部からの追記</p>
                        <p class="text-[11px] text-slate-300 break-words">${r.hq_comment}</p>
                    </div>` : ''}
                `;
                listEl.appendChild(card);
            });
        }

        // ==================== タブ2: 承認トレイロジック ====================
        function renderApprovalList() {
            // 本部権限がない場合は処理しない
            if (!currentUser.permissions || !currentUser.permissions.editAll) return;

            const pending = allReports.filter(r => r.status === 'pending' || r.status === 'returned');
            
            // バッジの更新
            const badge = document.getElementById('pendingBadge');
            if (pending.length > 0) {
                badge.innerText = pending.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            const listEl = document.getElementById('approvalList');
            listEl.innerHTML = "";
            
            if (pending.length === 0) {
                listEl.innerHTML = `
                    <div class="bg-slate-900 border border-slate-800 p-10 rounded-2xl text-center">
                        <i class="fa-solid fa-mug-hot text-4xl text-slate-700 mb-3"></i>
                        <p class="text-slate-500 text-sm font-bold">現在、承認待ちの報告はありません。</p>
                    </div>`;
                return;
            }

            pending.forEach(r => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-700 p-5 rounded-2xl shadow-lg";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 border-b border-slate-800 pb-3">
                        <div>
                            <span class="text-[10px] px-2 py-0.5 rounded border border-slate-700 bg-slate-800 text-slate-300 font-bold mr-2">${r.category}</span>
                            <span class="text-sm font-black text-white">${r.title}</span>
                        </div>
                        <div class="text-[10px] text-slate-400 font-mono text-right">
                            <p>${r.branch} / ${r.created_by}</p>
                            <p>発生日: ${r.incident_date}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
                            <span class="text-[10px] font-bold text-sky-400 block mb-1">【事象】</span>
                            <p class="text-xs text-slate-300 whitespace-pre-wrap">${r.content}</p>
                        </div>
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
                            <span class="text-[10px] font-bold text-emerald-400 block mb-1">【現場の対応策】</span>
                            <p class="text-xs text-slate-300 whitespace-pre-wrap">${r.action_taken}</p>
                        </div>
                    </div>

                    <div class="bg-indigo-950/10 border border-indigo-900/30 p-4 rounded-xl">
                        <div class="flex flex-col md:flex-row gap-4 items-start md:items-end">
                            <div class="w-full md:w-32">
                                <label class="text-[10px] text-amber-400 font-bold mb-1 block"><i class="fa-solid fa-star mr-1"></i>付与スコア</label>
                                <div class="relative">
                                    <input type="number" id="score_${r.id}" value="${r.score || 0}" class="w-full bg-slate-950 border border-amber-900/50 text-amber-400 font-black rounded-lg py-2 pl-3 pr-8 focus:border-amber-500 outline-none text-right">
                                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-amber-600 font-bold">pt</span>
                                </div>
                            </div>
                            <div class="w-full flex-grow">
                                <label class="text-[10px] text-sky-400 font-bold mb-1 block"><i class="fa-solid fa-comment-dots mr-1"></i>本部コメント (差戻し理由 または 補足)</label>
                                <textarea id="comment_${r.id}" rows="2" class="w-full bg-slate-950 border border-slate-700 text-white text-xs rounded-lg px-3 py-2 focus:border-sky-500 outline-none resize-y">${r.hq_comment || ''}</textarea>
                            </div>
                            <div class="w-full md:w-auto flex gap-2 shrink-0">
                                <button onclick="processApproval('${r.id}', 'returned')" class="flex-1 md:flex-none bg-rose-950/50 hover:bg-rose-900 border border-rose-800 text-rose-300 text-xs font-bold py-2.5 px-4 rounded-lg transition">差戻し</button>
                                <button onclick="processApproval('${r.id}', 'approved')" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black py-2.5 px-6 rounded-lg shadow-lg transition"><i class="fa-solid fa-check mr-1"></i>承認して共有</button>
                            </div>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        async function processApproval(reportId, newStatus) {
            const scoreInput = document.getElementById(`score_${reportId}`).value;
            const commentInput = document.getElementById(`comment_${reportId}`).value.trim();

            if (newStatus === 'returned' && !commentInput) {
                alert("差戻しの場合は、本部コメント（理由）を必ず入力してください。");
                return;
            }

            const confirmMsg = newStatus === 'approved' 
                ? `この内容で承認し、全店舗に共有します。\n付与スコア: ${scoreInput}pt\nよろしいですか？`
                : `この報告を現場へ差し戻します。\nよろしいですか？`;
            
            if (!confirm(confirmMsg)) return;

            showLoading(newStatus === 'approved' ? "承認処理中..." : "差戻し処理中...");

            try {
                const { error } = await db.from('hive_reports').update({
                    status: newStatus,
                    score: parseInt(scoreInput) || 0,
                    hq_comment: commentInput
                }).eq('id', reportId);

                if (error) throw error;
                
                // 再読み込みしてUI更新
                await fetchReports();
            } catch (err) {
                console.error(err);
                alert("処理に失敗しました。");
                hideLoading();
            }
        }

        // ==================== タブ3: 新規報告ロジック ====================
        async function submitReport() {
            const btn = document.getElementById('btnSubmitReport');
            const title = document.getElementById('reportTitle').value.trim();
            const category = document.getElementById('reportCategory').value;
            const incidentDate = document.getElementById('reportDate').value;
            const content = document.getElementById('reportContent').value.trim();
            const actionTaken = document.getElementById('reportAction').value.trim();

            if (!title || !incidentDate || !content || !actionTaken) {
                alert("必須項目をすべて入力してください。");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>送信中...';

            try {
                const newId = "HIVE" + new Date().getTime();
                const { error } = await db.from('hive_reports').insert([{
                    id: newId,
                    branch: currentUser.branch,
                    created_by: currentUser.name,
                    title: title,
                    category: category,
                    incident_date: incidentDate,
                    content: content,
                    action_taken: actionTaken,
                    status: 'pending',
                    score: 0
                }]);

                if (error) throw error;

                alert("ナレッジを申請しました！本部の確認をお待ちください。");
                
                // フォームをリセット
                document.getElementById('reportTitle').value = "";
                document.getElementById('reportContent').value = "";
                document.getElementById('reportAction').value = "";
                
                // 再読み込みしてナレッジ一覧タブへ戻す
                await fetchReports();
                switchTab('knowledge');
            } catch (err) {
                console.error(err);
                alert("送信に失敗しました。");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i>本部へ申請する';
            }
        }
    </script>
</body>
</html>
